<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Timetable Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: #4CAF50;
            color: white;
        }
        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #2196F3;
            color: white;
        }
        .btn-secondary:hover {
            background: #1976D2;
            transform: translateY(-2px);
        }
        .btn-danger {
            background: #f44336;
            color: white;
        }
        .btn-danger:hover {
            background: #d32f2f;
        }
        .btn-success {
            background: #4CAF50;
            color: white;
        }
        .btn-warning {
            background: #ff9800;
            color: white;
        }
        .timetable-grid {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .timetable-header {
            display: grid;
            grid-template-columns: 80px repeat(7, 1fr);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .timetable-header div {
            padding: 15px 10px;
            text-align: center;
            font-weight: 600;
            border-right: 1px solid rgba(255,255,255,0.2);
        }
        .timetable-header div:last-child {
            border-right: none;
        }
        .timetable-body {
            display: grid;
            grid-template-columns: 80px repeat(7, 1fr);
        }
        .time-slot {
            padding: 10px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            border-right: 1px solid #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #495057;
            font-size: 0.9rem;
        }
        .cell {
            padding: 8px;
            border-bottom: 1px solid #e9ecef;
            border-right: 1px solid #e9ecef;
            min-height: 100px;
            position: relative;
        }
        .cell:last-child {
            border-right: none;
        }
        .task-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .task-card.completed {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            opacity: 0.7;
        }
        .task-name {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        .task-timer {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }
        .timer-display {
            background: rgba(255,255,255,0.2);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }
        .timer-controls {
            display: flex;
            gap: 4px;
        }
        .timer-btn {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .timer-btn.start {
            background: #4CAF50;
            color: white;
        }
        .timer-btn.pause {
            background: #ff9800;
            color: white;
        }
        .timer-btn.reset {
            background: #f44336;
            color: white;
        }
        .timer-btn:hover {
            transform: scale(1.1);
        }
        .task-actions {
            display: flex;
            gap: 4px;
            margin-top: 5px;
        }
        .task-action-btn {
            padding: 4px 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }
        .task-action-btn.edit {
            background: #2196F3;
            color: white;
        }
        .task-action-btn.delete {
            background: #f44336;
            color: white;
        }
        .task-action-btn.complete {
            background: #4CAF50;
            color: white;
        }
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h2 {
            color: #333;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .empty-state p {
            font-size: 1.1rem;
        }
        .stats-bar {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #667eea;
        }
        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }
        @media (max-width: 768px) {
            .timetable-header,
            .timetable-body {
                grid-template-columns: 60px repeat(7, 100px);
            }
            
            .timetable-grid {
                overflow-x: auto;
            }
            
            header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📅 Smart Timetable Manager</h1>
            <p>Plan your day, track your time, achieve your goals</p>
        </header>
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="totalTasks">0</div>
                <div class="stat-label">Total Tasks</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completedTasks">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalTime">00:00:00</div>
                <div class="stat-label">Total Time Tracked</div>
            </div>
        </div>
        <div class="controls">
            <button class="btn btn-primary" onclick="openAddModal()">
                ➕ Add New Task
            </button>
            <button class="btn btn-secondary" onclick="exportTimetable()">
                📤 Export
            </button>
            <button class="btn btn-secondary" onclick="importTimetable()">
                📥 Import
            </button>
            <button class="btn btn-danger" onclick="clearAll()">
                🗑️ Clear All
            </button>
        </div>
        <div class="timetable-grid">
            <div class="timetable-header">
                <div>Time</div>
                <div>Monday</div>
                <div>Tuesday</div>
                <div>Wednesday</div>
                <div>Thursday</div>
                <div>Friday</div>
                <div>Saturday</div>
                <div>Sunday</div>
            </div>
            <div class="timetable-body" id="timetableBody">
                <!-- Generated by JavaScript -->
            </div>
        </div>
    </div>
    <!-- Add/Edit Task Modal -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Task</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <input type="hidden" id="taskDay">
                <input type="hidden" id="taskTime">
                
                <div class="form-group">
                    <label for="taskName">Task Name *</label>
                    <input type="text" id="taskName" required placeholder="Enter task name">
                </div>
                
                <div class="form-group">
                    <label for="taskDuration">Estimated Duration (minutes)</label>
                    <input type="number" id="taskDuration" min="1" placeholder="e.g., 30">
                </div>
                
                <div class="form-group">
                    <label for="taskColor">Color Theme</label>
                    <select id="taskColor">
                        <option value="purple">Purple (Default)</option>
                        <option value="blue">Blue</option>
                        <option value="green">Green</option>
                        <option value="orange">Orange</option>
                        <option value="red">Red</option>
                        <option value="pink">Pink</option>
                    </select>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn btn-danger" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>
    <!-- Import Modal -->
    <div class="modal" id="importModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Import Timetable</h2>
                <button class="close-btn" onclick="closeImportModal()">×</button>
            </div>
            <div class="form-group">
                <label for="importData">Paste your JSON data:</label>
                <textarea id="importData" rows="8" style="width: 100%; padding: 12px; border: 2px solid #e9ecef; border-radius: 8px; font-family: monospace;"></textarea>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-danger" onclick="closeImportModal()">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="processImport()">Import</button>
            </div>
        </div>
    </div>
    <script>
        // Data structure
        let timetableData = {};
        let timers = {};
        let intervals = {};
        const days = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];
        const timeSlots = [];
        
        // Generate time slots from 6 AM to 10 PM
        for (let hour = 6; hour <= 22; hour++) {
            const time = `${hour.toString().padStart(2, '0')}:00`;
            timeSlots.push(time);
        }
        const colorThemes = {
            purple: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
            blue: 'linear-gradient(135deg, #2196F3 0%, #1976D2 100%)',
            green: 'linear-gradient(135deg, #4CAF50 0%, #45a049 100%)',
            orange: 'linear-gradient(135deg, #ff9800 0%, #f57c00 100%)',
            red: 'linear-gradient(135deg, #f44336 0%, #d32f2f 100%)',
            pink: 'linear-gradient(135deg, #e91e63 0%, #c2185b 100%)'
        };
        // Initialize
        function init() {
            loadFromStorage();
            renderTimetable();
            startGlobalTimer();
        }
        // Load data from localStorage
        function loadFromStorage() {
            const saved = localStorage.getItem('timetableData');
            if (saved) {
                timetableData = JSON.parse(saved);
                // Restore timers
                Object.keys(timetableData).forEach(key => {
                    timetableData[key].forEach((task, index) => {
                        if (task.elapsedTime) {
                            timers[key + '_' + index] = task.elapsedTime;
                        }
                    });
                });
            }
        }
        // Save to localStorage
        function saveToStorage() {
            // Update elapsed times before saving
            Object.keys(timetableData).forEach(key => {
                timetableData[key].forEach((task, index) => {
                    task.elapsedTime = timers[key + '_' + index] || 0;
                });
            });
            localStorage.setItem('timetableData', JSON.stringify(timetableData));
        }
        // Render timetable
        function renderTimetable() {
            const body = document.getElementById('timetableBody');
            body.innerHTML = '';
            timeSlots.forEach(time => {
                // Time slot label
                const timeCell = document.createElement('div');
                timeCell.className = 'time-slot';
                timeCell.textContent = time;
                body.appendChild(timeCell);
                // Day cells
                days.forEach(day => {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.day = day;
                    cell.dataset.time = time;
                    cell.onclick = (e) => {
                        if (e.target === cell) {
                            openAddModal(day, time);
                        }
                    };
                    // Render tasks for this slot
                    const key = `${day}_${time}`;
                    if (timetableData[key]) {
                        timetableData[key].forEach((task, index) => {
                            const taskCard = createTaskCard(task, key, index);
                            cell.appendChild(taskCard);
                        });
                    }
                    body.appendChild(cell);
                });
            });
            updateStats();
        }
        // Create task card
        function createTaskCard(task, key, index) {
            const card = document.createElement('div');
            card.className = 'task-card' + (task.completed ? ' completed' : '');
            card.style.background = colorThemes[task.color] || colorThemes.purple;
            
            const timerKey = key + '_' + index;
            const elapsed = timers[timerKey] || 0;
            
            card.innerHTML = `
                <div class="task-name">${task.completed ? '✅ ' : ''}${escapeHtml(task.name)}</div>
                <div class="task-timer">
                    <span class="timer-display" id="timer_${timerKey}">${formatTime(elapsed)}</span>
                    <div class="timer-controls">
                        <button class="timer-btn start" onclick="startTimer('${timerKey}')" title="Start">▶</button>
                        <button class="timer-btn pause" onclick="pauseTimer('${timerKey}')" title="Pause">⏸</button>
                        <button class="timer-btn reset" onclick="resetTimer('${timerKey}')" title="Reset">⏹</button>
                    </div>
                </div>
                <div class="task-actions">
                    <button class="task-action-btn complete" onclick="toggleComplete('${key}', ${index})">✓</button>
                    <button class="task-action-btn edit" onclick="editTask('${key}', ${index})">✎</button>
                    <button class="task-action-btn delete" onclick="deleteTask('${key}', ${index})">✕</button>
                </div>
            `;
            
            return card;
        }
        // Timer functions
        function startTimer(timerKey) {
            if (intervals[timerKey]) return;
            
            intervals[timerKey] = setInterval(() => {
                timers[timerKey] = (timers[timerKey] || 0) + 1;
                const display = document.getElementById(`timer_${timerKey}`);
                if (display) {
                    display.textContent = formatTime(timers[timerKey]);
                }
                saveToStorage();
                updateStats();
            }, 1000);
        }
        function pauseTimer(timerKey) {
            if (intervals[timerKey]) {
                clearInterval(intervals[timerKey]);
                delete intervals[timerKey];
                saveToStorage();
            }
        }
        function resetTimer(timerKey) {
            pauseTimer(timerKey);
            timers[timerKey] = 0;
            const display = document.getElementById(`timer_${timerKey}`);
            if (display) {
                display.textContent = formatTime(0);
            }
            saveToStorage();
            updateStats();
        }
        function pauseAllTimers() {
            Object.keys(intervals).forEach(key => {
                clearInterval(intervals[key]);
            });
            intervals = {};
        }
        // Format time
        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }
        // Update stats
        function updateStats() {
            let total = 0;
            let completed = 0;
            let totalTime = 0;
            Object.keys(timetableData).forEach(key => {
                if (timetableData[key]) {
                    timetableData[key].forEach((task, index) => {
                        total++;
                        if (task.completed) completed++;
                        const timerKey = key + '_' + index;
                        totalTime += timers[timerKey] || 0;
                    });
                }
            });
            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('totalTime').textContent = formatTime(totalTime);
        }
        // Modal functions
        function openAddModal(day = null, time = null) {
            document.getElementById('modalTitle').textContent = 'Add New Task';
            document.getElementById('taskForm').reset();
            document.getElementById('taskId').value = '';
            document.getElementById('taskDay').value = day || '';
            document.getElementById('taskTime').value = time || '';
            document.getElementById('taskModal').classList.add('active');
        }
        function closeModal() {
            document.getElementById('taskModal').classList.remove('active');
        }
        function openImportModal() {
            document.getElementById('importModal').classList.add('active');
        }
        function closeImportModal() {
            document.getElementById('importModal').classList.remove('active');
        }
        // Form submission
        document.getElementById('taskForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const id = document.getElementById('taskId').value;
            const day = document.getElementById('taskDay').value;
            const time = document.getElementById('taskTime').value;
            const name = document.getElementById('taskName').value;
            const duration = document.getElementById('taskDuration').value;
            const color = document.getElementById('taskColor').value;
            if (id) {
                // Edit existing task
                const [key, index] = id.split('_');
                timetableData[key][index] = {
                    name,
                    duration: parseInt(duration) || 0,
                    color,
                    completed: timetableData[key][index].completed,
                    elapsedTime: timers[id] || 0
                };
            } else {
                // Add new task
                const key = `${day}_${time}`;
                if (!timetableData[key]) {
                    timetableData[key] = [];
                }
                timetableData[key].push({
                    name,
                    duration: parseInt(duration) || 0,
                    color,
                    completed: false,
                    elapsedTime: 0
                });
            }
            saveToStorage();
            renderTimetable();
            closeModal();
        });
        // Edit task
        function editTask(key, index) {
            const task = timetableData[key][index];
            document.getElementById('modalTitle').textContent = 'Edit Task';
            document.getElementById('taskId').value = `${key}_${index}`;
            document.getElementById('taskName').value = task.name;
            document.getElementById('taskDuration').value = task.duration;
            document.getElementById('taskColor').value = task.color;
            document.getElementById('taskModal').classList.add('active');
        }
        // Delete task
        function deleteTask(key, index) {
            if (confirm('Are you sure you want to delete this task?')) {
                const timerKey = key + '_' + index;
                pauseTimer(timerKey);
                delete timers[timerKey];
                
                timetableData[key].splice(index, 1);
                if (timetableData[key].length === 0) {
                    delete timetableData[key];
                }
                
                saveToStorage();
                renderTimetable();
            }
        }
        // Toggle complete
        function toggleComplete(key, index) {
            timetableData[key][index].completed = !timetableData[key][index].completed;
            saveToStorage();
            renderTimetable();
        }
        // Export
        function exportTimetable() {
            // Update elapsed times
            Object.keys(timetableData).forEach(key => {
                timetableData[key].forEach((task, index) => {
                    task.elapsedTime = timers[key + '_' + index] || 0;
                });
            });
            
            const data = JSON.stringify(timetableData, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'timetable.json';
            a.click();
            URL.revokeObjectURL(url);
        }
        // Import
        function importTimetable() {
            document.getElementById('importModal').classList.add('active');
        }
        function processImport() {
            try {
                const data = document.getElementById('importData').value;
                const imported = JSON.parse(data);
                
                // Pause all current timers
                pauseAllTimers();
                
                timetableData = imported;
                timers = {};
                
                // Restore timers
                Object.keys(timetableData).forEach(key => {
                    timetableData[key].forEach((task, index) => {
                        if (task.elapsedTime) {
                            timers[key + '_' + index] = task.elapsedTime;
                        }
                    });
                });
                
                saveToStorage();
                renderTimetable();
                closeImportModal();
                alert('Timetable imported successfully!');
            } catch (e) {
                alert('Invalid JSON data. Please check and try again.');
            }
        }
        // Clear all
        function clearAll() {
            if (confirm('Are you sure you want to clear all tasks? This cannot be undone.')) {
                pauseAllTimers();
                timetableData = {};
                timers = {};
                saveToStorage();
                renderTimetable();
            }
        }
        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        // Global timer for auto-save
        function startGlobalTimer() {
            setInterval(() => {
                saveToStorage();
            }, 30000); // Auto-save every 30 seconds
        }
        // Close modal on outside click
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });
        // Initialize on load
        init();
    </script>
</body>
</html
